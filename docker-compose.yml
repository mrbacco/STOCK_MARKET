name: stock-market-intelligence

x-runtime-environment: &runtime-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-stock_market}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-stock_market}
  REDIS_URL: redis://redis:6379/0
  CACHE_NAMESPACE: stock-market
  RUN_IN_PROCESS_SENTIMENT: "false"
  ANALYTICS_PERIODS: ${ANALYTICS_PERIODS:-1y}
  ANALYTICS_HORIZONS: ${ANALYTICS_HORIZONS:-1,3,5}
  ANALYTICS_INTERVAL_SECONDS: ${ANALYTICS_INTERVAL_SECONDS:-900}
  PROVIDER_MAX_ATTEMPTS: ${PROVIDER_MAX_ATTEMPTS:-3}
  PROVIDER_BACKOFF_SECONDS: ${PROVIDER_BACKOFF_SECONDS:-0.5}
  YAHOO_MIN_INTERVAL_SECONDS: ${YAHOO_MIN_INTERVAL_SECONDS:-0.25}
  NEWS_MIN_INTERVAL_SECONDS: ${NEWS_MIN_INTERVAL_SECONDS:-0.20}
  # yfinance persists timezone/cookie metadata in SQLite. Keep those files in
  # the image's writable application-data directory for every process role.
  YFINANCE_CACHE_DIR: ${YFINANCE_CACHE_DIR:-/app/data/yfinance-cache}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_market}
      POSTGRES_USER: ${POSTGRES_USER:-stock_market}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock_market} -d ${POSTGRES_DB:-stock_market}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "${REDIS_MAXMEMORY:-1gb}", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      <<: *runtime-environment
      # Web replicas never perform an unexpected model-training burst.
      ANALYTICS_READ_ONLY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sentiment-worker:
    build: .
    restart: unless-stopped
    command: ["python", "sentiment_worker.py"]
    environment:
      <<: *runtime-environment
      ANALYTICS_READ_ONLY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The shared image normally checks Streamlit on port 8501. This worker
      # has no HTTP server, so verify that PID 1 is still the expected worker
      # process instead of reporting a false "unhealthy" container.
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; sys.exit(0 if b'sentiment_worker.py' in Path('/proc/1/cmdline').read_bytes() else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  analytics-worker:
    build: .
    restart: unless-stopped
    command: ["python", "analytics_worker.py"]
    environment:
      <<: *runtime-environment
      ANALYTICS_READ_ONLY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Analytics is also a long-running Python process rather than a
      # Streamlit server. Checking its command line keeps Docker health state
      # aligned with the worker role while failures remain visible in logs.
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; sys.exit(0 if b'analytics_worker.py' in Path('/proc/1/cmdline').read_bytes() else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8501:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres-data:
  redis-data:
