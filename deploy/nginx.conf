# Streamlit uses a long-lived WebSocket for each browser session. `ip_hash`
# supplies sticky routing when the app service has multiple container replicas.
events {
    worker_connections 2048;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream streamlit_app {
        ip_hash;
        zone streamlit_app 64k;
        server app:8501 resolve;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://streamlit_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        location = /healthz {
            proxy_pass http://streamlit_app/_stcore/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 5s;
        }
    }
}
